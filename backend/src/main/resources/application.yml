spring:
  application:
    name: e-and-e-software-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

# JWT (use env vars in production)
jwt:
  secret: ${JWT_SECRET:EandESoftwareSolutionJwtSecretKeyForSigningTokenMinimumLength256BitsRequired}
  expiration-ms: 86400000

server:
  port: ${PORT:8080}

# Comma-separated origins for CORS (e.g. https://your-app.vercel.app)
app.allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
